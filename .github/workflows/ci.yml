name: C CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest
    steps:
      # 1. Clone repository
      - name: Clone
        uses: actions/checkout@v4

      # 2. Install clang-format
      - name: Run clang-format
        uses: jidicula/clang-format-action@v4.11.0
        with:
          clang-format-version: '14'
          check-path: 'mlx-codefree-communication'

  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      # 1. Clone repository
      - name: Clone
        uses: actions/checkout@v4

      # 2. Install necessary packages
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          # Graphviz is optional, but it allows Doxygen to draw cool call-graphs!
          sudo apt-get install -y doxygen graphviz 

      # 3. Generate documentation
      - name: Run Doxygen
        run: doxygen Doxyfile

      # 4. Upload documentation artifacts
      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Doxygen-HTML-Docs
          path: html/
          retention-days: 14

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      # 1. Clone repository
      - name: Clone
        uses: actions/checkout@v4

      # 2. Install Ceedling to run tests (using ruby)
      - name: Install Ceedling
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby
          sudo gem install ceedling

      # 3. Run tests
      - name: Run Unit Tests
        run: ceedling test:all